<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Student Cloud Database</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Student Cloud Database</h1>

  <input id="fullname" placeholder="Full Name">
  <input id="studentcode" placeholder="Student Code">
  <input id="classname" placeholder="Class Name">

  <button onclick="addStudent()">
    Add Student
  </button>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Code</th>
        <th>Class</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="studentList"></tbody>
  </table>

  <script type="module" src="script.js"></script>

</body>

</html>
