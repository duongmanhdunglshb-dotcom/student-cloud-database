<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Cloud Database</title>
<style>
/* --- PHẦN GIAO DIỆN ĐÃ ĐƯỢC LÀM ĐẸP --- */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 40px auto;
  max-width: 900px;
  background-color: #f8fafc;
  color: #334155;
  padding: 0 20px;
}

h1 {
  color: #1e293b;
  text-align: center;
  margin-bottom: 30px;
  font-weight: 700;
}

/* Khu vực nhập liệu */
input {
  padding: 12px 16px;
  margin: 8px 5px;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  font-size: 15px;
  width: calc(25% - 20px);
  min-width: 180px;
  box-sizing: border-box;
  transition: all 0.3s ease;
}

input:focus {
  outline: none;
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
}

/* Nút bấm chung */
button {
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

/* Nút Add Student */
button[onclick="addStudent()"] {
  background-color: #3b82f6;
  color: white;
}

button[onclick="addStudent()"]:hover {
  background-color: #2563eb;
}

/* Bảng dữ liệu */
table {
  width: 100%;
  margin-top: 30px;
  border-collapse: separate;
  border-spacing: 0;
  background-color: white;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}

th, td {
  padding: 14px 20px;
  text-align: left;
  border-bottom: 1px solid #f1f5f9;
}

th {
  background-color: #f1f5f9;
  color: #475569;
  font-weight: 600;
  border-bottom: 2px solid #e2e8f0;
}

tbody tr:hover {
  background-color: #f8fafc;
}

/* Nút Delete trong bảng */
tbody button {
  background-color: #ef4444;
  color: white;
  padding: 8px 16px;
  font-size: 14px;
}

tbody button:hover {
  background-color: #dc2626;
}

/* Tối ưu trên điện thoại */
@media (max-width: 640px) {
  input {
    width: 100%;
    margin: 8px 0;
  }
  button[onclick="addStudent()"] {
    width: 100%;
  }
}
</style>

</head>
<body>

<h1>Student Cloud Database</h1>

<input id="fullname" placeholder="Full Name">
<input id="studentcode" placeholder="Student Code">
<input id="classname" placeholder="Class Name">

<button onclick="addStudent()">
Add Student
</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Code</th>
<th>Class</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentList"></tbody>
</table>

<script type="module">

import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://lzajluuziausoascbjrp.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6YWpsdXV6aWF1c29hc2NianJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5ODA0NzEsImV4cCI6MjA5NjU1NjQ3MX0.aMLcgeP-x35f-_ta-_SRY0DN22p7ImaBd93NL-6H7MM";

const supabase =
createClient(supabaseUrl,supabaseKey);

async function loadStudents(){

const { data,error } =
await supabase
.from("students")
.select("*")
.order("id");

if(error){
console.log(error);
return;
}

let html="";

data.forEach(student=>{

html += `
<tr>
<td>${student.id}</td>
<td>${student.full_name}</td>
<td>${student.student_code}</td>
<td>${student.class_name}</td>
<td>
<button onclick="deleteStudent(${student.id})">
Delete
</button>
</td>
</tr>
`;
});

document.getElementById("studentList").innerHTML =
html;
}

window.addStudent = async ()=>{

const full_name =
document.getElementById("fullname").value;

const student_code =
document.getElementById("studentcode").value;

const class_name =
document.getElementById("classname").value;

await supabase
.from("students")
.insert([
{
full_name,
student_code,
class_name
}
]);

loadStudents();
}

window.deleteStudent = async(id)=>{

await supabase
.from("students")
.delete()
.eq("id",id);

loadStudents();
}

loadStudents();

</script>

</body>
</html>
