<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Student Cloud Database</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<h1>Student Cloud Database</h1>

<div class="form-container">
  <input id="fullname" placeholder="Full Name" />
  <input id="studentcode" placeholder="Student Code" />
  <input id="classname" placeholder="Class Name" />
  <button id="addButton">Add Student</button>
</div>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Code</th>
      <th>Class</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="studentList"></tbody>
</table>

<script type="module" src="app.js"></script>

</body>
</html>
